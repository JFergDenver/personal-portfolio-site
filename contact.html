      <div class="site-title"><span class="prompt">~$</span> whoami</div>

  <main class="wrapper">
    <section class="hero">
      <h1>Contact</h1>
      <p>Have a project in mind or just want to say hi? Send a message below.</p>
    </section>

    <section>
      <h2>message</h2>
      <form id="contact-form" novalidate>
        <div>
          <label for="name">name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div>
          <label for="email">email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div>
          <label for="message">message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit">send message</button>
        <p class="form-status" id="form-status" role="status"></p>
      </form>
    </section>

    <section>
      <h2>elsewhere</h2>
      <div class="links-row">
        <a class="btn" href="mailto:fergjeff@gmail.com">email</a>
        <a class="btn" href="#">github</a>
        <a class="btn" href="#">linkedin</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <span>&copy; <span id="year"></span> Jeff Ferguson</span>
      <span>Built with HTML, CSS &amp; JS</span>
